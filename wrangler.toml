name = "simple-chat"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Serve everything in /public as static assets
[assets]
directory = "./public"
binding = "ASSETS"

# Durable Object binding for the shared chat room
[[durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoom"

# Required migration to register the Durable Object class
[[migrations]]
tag = "v1"
new_classes = ["ChatRoom"]
